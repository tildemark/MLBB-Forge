<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLBB Forge</title>
    <link rel="manifest" href="/manifest.json" />
    <style>
      body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #09090f; color: #f3f3f3; font-family: Inter, sans-serif; }
      .container { max-width: 420px; width: 100%; padding: 24px; text-align: center; }
      h1 { margin-bottom: 16px; font-size: 1.75rem; }
      p { margin: 0 0 18px; line-height: 1.6; color: #c8c8d4; }
      button { appearance: none; border: none; border-radius: 999px; padding: 12px 20px; color: #0a0a0f; background: #e8c96a; font-weight: 700; cursor: pointer; }
      button:hover { background: #d8b85d; }
      .status { margin-top: 18px; font-size: 0.95rem; color: #9ca3af; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>MLBB Forge</h1>
      <p id="message">Checking connection and loading the app…</p>
      <button id="retry" class="hidden">Retry connection</button>
      <div id="status" class="status"></div>
    </div>

    <script>
      const remoteUrl = 'https://forge.sanchez.ph';
      const messageEl = document.getElementById('message');
      const retryEl = document.getElementById('retry');
      const statusEl = document.getElementById('status');

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function showOffline() {
        messageEl.textContent = 'No internet connection detected. Please connect to the internet and try again.';
        retryEl.classList.remove('hidden');
        setStatus('Offline fallback is active. The app cannot load without network access.');
      }

      async function tryLoadRemote() {
        messageEl.textContent = 'Attempting to load MLBB Forge…';
        retryEl.classList.add('hidden');
        setStatus('Checking network connectivity...');

        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 10000);
          await fetch(remoteUrl, { method: 'HEAD', mode: 'no-cors', cache: 'no-store', signal: controller.signal });
          clearTimeout(timeoutId);
          window.location.replace(remoteUrl);
        } catch (error) {
          showOffline();
        }
      }

      retryEl.addEventListener('click', tryLoadRemote);

      if (navigator.onLine) {
        tryLoadRemote();
      } else {
        showOffline();
      }

      window.addEventListener('online', tryLoadRemote);
    </script>
  </body>
</html>
