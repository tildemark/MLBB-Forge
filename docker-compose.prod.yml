# docker-compose.prod.yml — Production (OCI compute instance)
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# The Next.js app is built and served as a container alongside Postgres + Redis.
# Traefik handles TLS and reverse proxying for forge.sanchez.ph

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlbb_forge_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlbb-forge.rule=Host(`forge.sanchez.ph`)"
      - "traefik.http.routers.mlbb-forge.entrypoints=websecure"
      - "traefik.http.routers.mlbb-forge.tls.certresolver=letsencrypt"
      - "traefik.http.services.mlbb-forge.loadbalancer.server.port=3000"
    networks:
      - web
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: mlbb_forge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No external port exposure in prod — app connects via Docker network

  redis:
    image: redis:7-alpine
    container_name: mlbb_forge_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - web

volumes:
  postgres_data:
  redis_data:
  letsencrypt:

networks:
  web:
    external: true
  internal:
    driver: bridge
