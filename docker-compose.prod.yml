# docker-compose.prod.yml — Production (OCI Always Free)
# Deployed via Portainer stack (GitHub repo integration).
# TLS/reverse-proxy is handled externally by Nginx Proxy Manager
# which sits on the shared external Docker network "net".
#
# Usage:  docker compose -f docker-compose.prod.yml up -d
# Nginx Proxy Manager → forward to  http://mlbb_forge_app:3000  (domain: forge.sanchez.ph)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlbb_forge_app:latest
    container_name: mlbb_forge_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Public URL — overrides the localhost value in .env
      NEXT_PUBLIC_APP_URL: "https://forge.sanchez.ph"
      AUTH_URL: "https://forge.sanchez.ph"
      # Override DATABASE_URL to use the internal service name
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      # Override REDIS_URL to use the internal service name + password
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    command: >
      sh -c "npx prisma migrate deploy && node server.js"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - net       # reachable by Nginx Proxy Manager
      - internal  # reaches postgres + redis

  postgres:
    image: postgres:16-alpine
    container_name: mlbb_forge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mlbb_forge_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  net:
    external: true   # shared network where Nginx Proxy Manager lives
  internal:
    driver: bridge   # private — postgres + redis not exposed externally
